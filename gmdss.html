let mistakes = [];
let interval;

function render(questions, isExam=false) {

    let html = "";

    questions.forEach((q, index) => {

        html += `<div class="card">
        <b>${index+1}. ${q.q}</b>`;

        for(let key in q.options) {

            html += `<div class="option" onclick="answer(this, '${key}', '${q.correct}', ${index})">
            ${key}: ${q.options[key]}
            </div>`;
        }

        html += "</div>";
    });

    document.getElementById("quiz").innerHTML = html;
}

function answer(el, choice, correct, index) {

    if(el.parentElement.classList.contains("done")) return;

    el.parentElement.classList.add("done");

    if(choice === correct) {
        el.classList.add("correct");
    } else {
        el.classList.add("wrong");

        if(!mistakes.includes(index)) {
            mistakes.push(index);
        }

        // подсветка правильного
        let options = el.parentElement.querySelectorAll(".option");
        options.forEach(opt => {
            if(opt.innerText.startsWith(correct)) {
                opt.classList.add("correct");
            }
        });
    }
}

function practice() {
    clearInterval(interval);
    document.getElementById("timer").innerText = "";
    render(ALL);
}

function exam() {

    mistakes = [];

    let shuffled = [...ALL].sort(()=>Math.random()-0.5).slice(0,45);

    render(shuffled, true);

    startTimer(45*60);
}

function mistakesMode() {

    if(mistakes.length === 0) {
        alert("No mistakes");
        return;
    }

    let wrongQuestions = mistakes.map(i => ALL[i]);

    render(wrongQuestions);

    // очистка после просмотра
    mistakes = [];
}

function resetAll() {
    mistakes = [];
    document.getElementById("quiz").innerHTML = "";
    document.getElementById("timer").innerText = "";
    clearInterval(interval);
}

function startTimer(sec) {

    clearInterval(interval);

    interval = setInterval(() => {

        let m = Math.floor(sec/60);
        let s = sec%60;

        document.getElementById("timer").innerText =
            "Time: " + m + ":" + (s<10?"0"+s:s);

        if(sec <= 0) {
            clearInterval(interval);
            alert("Time is up!");
        }

        sec--;

    },1000);
}
