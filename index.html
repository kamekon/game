<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 400px;
        }

        h1 {
            font-size: 72px;
            margin: 0;
            color: #d32f2f;
        }

        h2 {
            margin-top: 10px;
            font-weight: normal;
        }

        p {
            margin-top: 20px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            width: 100%;
            background: #1976d2;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1259a7;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>

    <p>
        If you are the owner of this project, enter the password sent to your email address.
    </p>

    <input type="password" id="password" placeholder="Enter password">

    <button onclick="checkPassword()">Continue</button>

    <div class="error" id="error">
        Incorrect password
    </div>
</div>

<script>
    function checkPassword() {
        const password = document.getElementById('password').value;

        // Правильный пароль
        const correctPassword = 'LZWP32';

        if (password === correctPassword) {
            // Переход на другой файл
            window.location.href = 'gmdss.html';
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }
</script>

</body>
</html>
